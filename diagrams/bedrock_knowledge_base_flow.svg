<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ar3" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <linearGradient id="hg3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>

  <rect width="800" height="480" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <rect x="0" y="0" width="800" height="50" rx="12" fill="url(#hg3)"/>
  <rect x="0" y="25" width="800" height="25" fill="url(#hg3)"/>
  <text x="400" y="33" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Bedrock Knowledge Base — Document Q&amp;A Flow</text>

  <!-- User Question -->
  <rect x="280" y="75" width="240" height="50" rx="25" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="400" y="97" text-anchor="middle" fill="#9d174d" font-size="14" font-weight="bold">User Question</text>
  <text x="400" y="113" text-anchor="middle" fill="#be185d" font-size="10">"What did the motion for dismissal argue?"</text>

  <!-- Arrow -->
  <line x1="400" y1="125" x2="400" y2="160" stroke="#475569" stroke-width="1.5" marker-end="url(#ar3)"/>
  <text x="412" y="147" fill="#475569" font-size="10">1</text>

  <!-- Bedrock KB: RetrieveAndGenerate -->
  <rect x="180" y="165" width="440" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="190" text-anchor="middle" fill="#92400e" font-size="14" font-weight="bold">Bedrock Knowledge Base</text>
  <text x="400" y="206" text-anchor="middle" fill="#b45309" font-size="11">RetrieveAndGenerate API (single call)</text>
  <text x="400" y="222" text-anchor="middle" fill="#92400e" font-size="10">auto-chunking | auto-embedding | vector search | generation</text>

  <!-- Arrow to OpenSearch -->
  <line x1="400" y1="235" x2="400" y2="275" stroke="#475569" stroke-width="1.5" marker-end="url(#ar3)"/>
  <text x="412" y="260" fill="#475569" font-size="10">2</text>
  <text x="430" y="260" fill="#64748b" font-size="9">vector search</text>

  <!-- OpenSearch -->
  <rect x="230" y="280" width="340" height="55" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="303" text-anchor="middle" fill="#3730a3" font-size="13" font-weight="bold">OpenSearch Serverless</text>
  <text x="400" y="320" text-anchor="middle" fill="#4338ca" font-size="10">Vector store — Titan Embeddings V2 (1024-dim)</text>

  <!-- Arrow right to S3 -->
  <line x1="570" y1="307" x2="625" y2="307" stroke="#475569" stroke-width="1.5" marker-end="url(#ar3)"/>
  <text x="592" y="300" fill="#475569" font-size="10">3</text>

  <!-- S3 source -->
  <rect x="630" y="280" width="140" height="55" rx="8" fill="#fed7aa" stroke="#ea580c" stroke-width="1.5"/>
  <text x="700" y="303" text-anchor="middle" fill="#9a3412" font-size="13" font-weight="bold">S3 Bucket</text>
  <text x="700" y="320" text-anchor="middle" fill="#9a3412" font-size="10">clean_markdown/</text>

  <!-- Arrow from OpenSearch back up to KB -->
  <line x1="230" y1="307" x2="150" y2="307" stroke="#475569" stroke-width="1"/>
  <line x1="150" y1="307" x2="150" y2="200" stroke="#475569" stroke-width="1"/>
  <line x1="150" y1="200" x2="180" y2="200" stroke="#475569" stroke-width="1" marker-end="url(#ar3)"/>
  <text x="120" y="260" fill="#64748b" font-size="9">top-k</text>
  <text x="120" y="273" fill="#64748b" font-size="9">chunks</text>

  <!-- Arrow from KB down to Claude -->
  <line x1="400" y1="235" x2="400" y2="275" stroke="#475569" stroke-width="0" />
  <line x1="340" y1="235" x2="340" y2="375" stroke="#475569" stroke-width="1.5" marker-end="url(#ar3)"/>
  <text x="348" y="360" fill="#475569" font-size="10">4</text>
  <text x="295" y="360" fill="#64748b" font-size="9">chunks +</text>
  <text x="295" y="373" fill="#64748b" font-size="9">question</text>

  <!-- Claude Generation -->
  <rect x="230" y="380" width="340" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="403" text-anchor="middle" fill="#1e3a8a" font-size="14" font-weight="bold">Claude 3.5 Sonnet</text>
  <text x="400" y="419" text-anchor="middle" fill="#1e40af" font-size="10">Generates answer grounded in retrieved chunks</text>

  <!-- Arrow to result -->
  <line x1="400" y1="430" x2="400" y2="455" stroke="#475569" stroke-width="1.5" marker-end="url(#ar3)"/>

  <!-- Result -->
  <rect x="285" y="445" width="230" height="28" rx="14" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="464" text-anchor="middle" fill="#166534" font-size="12" font-weight="bold">Cited Answer → User</text>
</svg>
